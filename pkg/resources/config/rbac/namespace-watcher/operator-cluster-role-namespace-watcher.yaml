# Minimal cluster-scoped role for the dynamic multi-namespace mode. It grants the operator
# read-only access to namespace metadata so it can discover which namespaces carry the watch
# label. It does NOT grant access to secrets, pods, or any workload resource in any namespace —
# those remain governed by the namespaced operator Role installed per watched namespace.
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: camel-k-operator-namespace-watcher
  labels:
    app: "camel-k"
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  verbs:
  - get
  - list
  - watch
